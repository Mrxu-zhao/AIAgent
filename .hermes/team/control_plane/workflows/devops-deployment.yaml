workflow_id: devops-deployment
name: 部署配置工作流
description: 从应用配置到K8s部署的完整DevOps流程
role: devops
steps:
  - step_id: read_requirements
    name: 读取部署需求
    tool: read_knowledge
    input:
      paths: ["deploy/{feature}.md"]

  - step_id: generate_dockerfile
    name: 生成Dockerfile
    tool: generate_dockerfile
    input:
      app_type: "{app_type}"
      app_name: "{feature}"
      port: "${port}"

  - step_id: write_dockerfile
    name: 写入Dockerfile
    tool: write_file
    input:
      path: "docker/{feature}/Dockerfile"
      content: "${generate_dockerfile.output}"

  - step_id: generate_k8s_manifests
    name: 生成K8s配置
    tool: generate_k8s_manifests
    input:
      service_name: "{feature}"
      image: "{feature}:latest"
      port: "${port}"
      replicas: 3

  - step_id: write_k8s_manifests
    name: 写入K8s配置
    tool: write_file
    input:
      path: "k8s/{feature}/deployment.yaml"
      content: "${generate_k8s_manifests.output}"

  - step_id: handoff
    name: 通知团队部署完成
    tool: dispatch_task
    input:
      agent_id: "project-manager"
      task: "{feature}部署配置已生成，可进行部署"
