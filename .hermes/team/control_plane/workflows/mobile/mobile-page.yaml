workflow_id: mobile-page
name: 移动端页面开发工作流
description: 移动端场景下的页面开发流程
role: frontend-dev
scene: mobile
stack_selection:
  prompt: "请选择移动端技术栈"
  options: ["mini-program", "harmony-arkts"]
  default: "mini-program"
steps:
  - step_id: read_design
    name: 读取移动端设计
    tool: read_knowledge
    input:
      paths: ["design/mobile-{feature}.md"]

  - step_id: read_api_contract
    name: 读取接口契约
    tool: read_knowledge
    input:
      paths: ["api/{feature}.md"]

  - step_id: generate_page
    name: 生成页面
    tool: generate_code
    input:
      template: "mobile_page"
      variables:
        feature: "{feature}"
        platform: "{platform}"

  - step_id: write_page
    name: 写入页面
    tool: write_file
    input:
      path: "pages/{feature}/index.js"
      content: "${generate_page.output}"

  - step_id: generate_api_adapter
    name: 生成API适配
    tool: generate_api_client
    input:
      api_name: "{Feature}"
      endpoint: "/api/{feature}"
      methods: ["GET", "POST"]

  - step_id: write_api_adapter
    name: 写入API适配
    tool: write_file
    input:
      path: "utils/api/{feature}.js"
      content: "${generate_api_adapter.output}"

  - step_id: run_linter
    name: 执行代码检查
    tool: run_linter
    input:
      file_path: "pages/{feature}"
      timeout: 60

  - step_id: self_check
    name: 自检
    tool: read_knowledge
    input:
      paths: ["delivery/quality_gates/self-checklist.md"]

  - step_id: handoff
    name: 交接给QA
    tool: dispatch_task
    input:
      agent_id: "qa-functional"
      task: "{feature}移动端页面已完成，请进行兼容性测试"
