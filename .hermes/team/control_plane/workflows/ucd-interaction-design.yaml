workflow_id: ucd-interaction-design
name: 交互设计工作流
description: 从需求到设计规范的完整UCD流程
role: ucd
steps:
  - step_id: read_requirements
    name: 读取需求文档
    tool: read_knowledge
    input:
      paths: ["requirements/{feature}.md"]

  - step_id: generate_design_spec
    name: 生成设计规范
    tool: generate_design_spec
    input:
      feature: "{Feature}"
      platform: "{platform}"

  - step_id: write_design_spec
    name: 写入设计规范
    tool: write_file
    input:
      path: "design/{feature}_spec.md"
      content: "${generate_design_spec.output}"

  - step_id: handoff_frontend
    name: 交接给前端开发
    tool: dispatch_task
    input:
      agent_id: "frontend-dev"
      task: "{feature}设计规范已完成，请按规范实现"

  - step_id: handoff_qa
    name: 交接给测试
    tool: dispatch_task
    input:
      agent_id: "qa-functional"
      task: "{feature}设计规范已完成，请设计UI测试用例"
