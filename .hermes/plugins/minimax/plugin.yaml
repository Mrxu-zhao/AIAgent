name: minimax
version: "1.0.0"
description: "Sandbox communication hub: forward all Hermes Agent events to claw-server via HTTP, with bridge HTTP server for inbound commands"
author: "matrix"

provides_hooks:
  - pre_tool_call
  - post_tool_call
  - pre_llm_call
  - post_llm_call
  - pre_api_request
  - post_api_request
  - on_session_start
  - on_session_end
  - on_session_finalize
  - on_session_reset
