workflow_id: web-analyst-requirements
name: Web需求分析工作流
description: Web业务场景下的需求分析流程
role: analyst
scene: web
steps:
  - step_id: read_interview
    name: 读取访谈记录
    tool: read_knowledge
    input:
      paths: ["interviews/{feature}.md"]

  - step_id: generate_prd
    name: 生成PRD
    tool: generate_prd
    input:
      feature: "{Feature}"
      background: "{background}"

  - step_id: write_prd
    name: 写入PRD
    tool: write_file
    input:
      path: "requirements/{feature}_prd.md"
      content: "${generate_prd.output}"

  - step_id: self_check
    name: 自检
    tool: read_knowledge
    input:
      paths: ["delivery/quality_gates/self-checklist.md"]

  - step_id: handoff_architect
    name: 交接给架构师
    tool: dispatch_task
    input:
      agent_id: "architect"
      task: "{feature} PRD已完成，请进行架构设计"

  - step_id: handoff_ucd
    name: 交接给UCD
    tool: dispatch_task
    input:
      agent_id: "ucd"
      task: "{feature} PRD已完成，请进行交互设计"
