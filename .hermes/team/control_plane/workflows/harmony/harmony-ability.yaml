workflow_id: harmony-ability
name: 鸿蒙Ability开发工作流
description: 鸿蒙场景下的Ability开发流程
role: frontend-dev
scene: harmony
stack_selection:
  prompt: "鸿蒙技术栈"
  options: ["harmony-arkts"]
  default: "harmony-arkts"
steps:
  - step_id: read_requirements
    name: 读取鸿蒙需求
    tool: read_knowledge
    input:
      paths: ["requirements/harmony-{feature}.md"]

  - step_id: read_architecture
    name: 读取鸿蒙架构
    tool: read_knowledge
    input:
      paths: ["architecture/harmony-{feature}.md"]

  - step_id: generate_ability
    name: 生成Ability
    tool: generate_code
    input:
      template: "harmony_ability"
      variables:
        feature: "{feature}"
        ability_name: "{Feature}Ability"

  - step_id: write_ability
    name: 写入Ability
    tool: write_file
    input:
      path: "entry/src/main/ets/pages/{Feature}Ability.ets"
      content: "${generate_ability.output}"

  - step_id: generate_distributed
    name: 生成分布式能力
    tool: generate_code
    input:
      template: "harmony_distributed"
      variables:
        feature: "{feature}"

  - step_id: write_distributed
    name: 写入分布式能力
    tool: write_file
    input:
      path: "entry/src/main/ets/distributed/{Feature}Distributed.ets"
      content: "${generate_distributed.output}"

  - step_id: run_tests
    name: 执行鸿蒙测试
    tool: run_command
    input:
      command: "ohpm test"
      timeout: 120

  - step_id: self_check
    name: 自检
    tool: read_knowledge
    input:
      paths: ["delivery/quality_gates/self-checklist.md"]

  - step_id: handoff
    name: 交接给QA
    tool: dispatch_task
    input:
      agent_id: "qa-functional"
      task: "{feature}鸿蒙Ability已完成，请进行鸿蒙设备测试"
