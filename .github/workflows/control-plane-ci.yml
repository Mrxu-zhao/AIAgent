name: control-plane-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff coverage
      - name: Ruff
        run: |
          ruff check .hermes/team/control_plane \
            .hermes/team/调度框架/core \
            .hermes/team/调度框架/cli/team-cli.py \
            tests/control_plane
      - name: Unit tests
        run: python -B -m unittest discover -s tests/control_plane -p "test_*.py" -v
      - name: Coverage
        run: |
          python -B -m coverage run -m unittest discover -s tests/control_plane -p "test_*.py"
          python -B -m coverage report \
            --include=".hermes/team/control_plane/config.py,.hermes/team/control_plane/persistent_bus.py,.hermes/team/control_plane/workflow_runtime.py,.hermes/team/control_plane/cli.py" \
            --fail-under=90
      - name: Upload control plane artifacts
        uses: actions/upload-artifact@v4
        with:
          name: control-plane-artifacts
          path: |
            .coverage
            .hermes/team/control_plane/artifacts
