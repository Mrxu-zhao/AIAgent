workflow_id: frontend-page-development
name: 前端页面开发工作流
description: 从设计稿到页面完成的完整前端开发流程
role: frontend-dev
steps:
  - step_id: read_design
    name: 读取设计规范
    tool: read_knowledge
    input:
      paths: ["design/{feature}.md"]

  - step_id: search_components
    name: 搜索现有组件
    tool: search_code
    input:
      pattern: "{Feature}"
      glob: "*.vue"

  - step_id: generate_component
    name: 生成Vue组件
    tool: generate_vue_component
    input:
      component_name: "{Feature}"
      props: ["data"]
      emits: ["update"]

  - step_id: write_component
    name: 写入组件文件
    tool: write_file
    input:
      path: "src/components/{Feature}.vue"
      content: "${generate_component.output}"

  - step_id: generate_api_client
    name: 生成API客户端
    tool: generate_api_client
    input:
      api_name: "{Feature}"
      endpoint: "/api/{feature}"
      methods: ["GET", "POST"]

  - step_id: write_api_client
    name: 写入API客户端文件
    tool: write_file
    input:
      path: "src/api/{feature}.ts"
      content: "${generate_api_client.output}"

  - step_id: run_linter
    name: 执行代码检查
    tool: run_linter
    input:
      file_path: "src/components/{Feature}.vue"
      timeout: 60

  - step_id: handoff
    name: 交接给后端联调
    tool: dispatch_task
    input:
      agent_id: "backend-dev"
      task: "{feature}前端页面已完成，请提供对应API"
