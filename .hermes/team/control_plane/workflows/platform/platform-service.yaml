workflow_id: platform-service
name: 平台服务开发工作流
description: 平台工具场景下的核心服务开发流程
role: backend-dev
scene: platform
stack_selection:
  prompt: "请选择后端技术栈"
  options: ["java-spring", "go-gin", "python-fastapi"]
  default: "java-spring"
steps:
  - step_id: read_requirements
    name: 读取需求
    tool: read_knowledge
    input:
      paths: ["requirements/{feature}.md"]

  - step_id: design_plugin
    name: 设计插件机制
    tool: generate_architecture_doc
    input:
      system_name: "{Feature}插件系统"
      requirements: "支持扩展点、配置化、热插拔"

  - step_id: generate_core
    name: 生成核心服务
    tool: generate_service
    input:
      class_name: "{Feature}CoreService"
      package: "com.example.platform"
      entity_name: "{Feature}"

  - step_id: write_core
    name: 写入核心服务
    tool: write_file
    input:
      path: "src/main/java/com/example/platform/{Feature}CoreService.java"
      content: "${generate_core.output}"

  - step_id: generate_plugin_interface
    name: 生成插件接口
    tool: generate_code
    input:
      template: "java_interface"
      variables:
        class_name: "{Feature}Plugin"
        package: "com.example.platform.plugin"

  - step_id: write_plugin_interface
    name: 写入插件接口
    tool: write_file
    input:
      path: "src/main/java/com/example/platform/plugin/{Feature}Plugin.java"
      content: "${generate_plugin_interface.output}"

  - step_id: run_tests
    name: 执行测试
    tool: run_unit_tests
    input:
      test_path: "{Feature}CoreServiceTest"
      timeout: 120

  - step_id: self_check
    name: 自检
    tool: read_knowledge
    input:
      paths: ["delivery/quality_gates/self-checklist.md"]

  - step_id: handoff
    name: 交接给DevOps
    tool: dispatch_task
    input:
      agent_id: "devops"
      task: "{feature}平台服务已完成，请配置部署"
